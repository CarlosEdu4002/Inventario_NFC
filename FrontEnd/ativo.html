<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detalhe do Ativo</title>
  <link rel="icon" href="http://localhost:3000/favicon.ico">
  <link rel="stylesheet" href="css/style_ativo.css">
</head>

<body>

<div class="card">

    <img src="http://localhost:3000/patena.png"
         alt="Patena"
         class="logo">

    <h1>Detalhe do Ativo</h1>

    <div id="conteudo" class="loading">
        Carregando dados do ativo...
    </div>

    <div class="botoes">
        <button class="botao" onclick="history.back()">
            Voltar
        </button>
    </div>

</div>

  <script>
    // Pega o ID da URL: ativo.html?id=PAL001
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    async function carregarAtivo() {
      const container = document.getElementById("conteudo");

      if (!id) {
        container.innerHTML = `<p class="erro">ID não informado na URL</p>`;
        return;
      }

      try {
        const response = await fetch(`/api/ativos/${id}`);

        if (!response.ok) {
          throw new Error("Ativo não encontrado");
        }

        const ativo = await response.json();

        container.innerHTML = `
          <div class="linha"><span class="label">Patrimônio:</span> ${ativo.patrimonio || ativo.id}</div>
          <div class="linha"><span class="label">Descrição:</span> ${ativo.descricao || "N/A"}</div>
          <div class="linha"><span class="label">Categoria:</span> ${ativo.categoria || "N/A"}</div>
          <div class="linha"><span class="label">Setor:</span> ${ativo.setor || "N/A"}</div>
          <div class="linha"><span class="label">Responsável:</span> ${ativo.responsavel || "N/A"}</div>
          <div class="linha"><span class="label">Status:</span> ${ativo.status || "N/A"}</div>
        `;

      } catch (err) {
        container.innerHTML = `<p class="erro">Erro ao carregar ativo</p>`;
      }
    }

    carregarAtivo();
  </script>

</body>
</html>
