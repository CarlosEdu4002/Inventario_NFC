<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detalhe do Ativo</title>
  <link rel="icon" href="/Imagens/favicon.ico">
  <link rel="stylesheet" href="css/style_ativo.css">
</head>

<body>

<div class="card">

    <img src="/Imagens/patena.png"
         alt="Patena"
         class="logo">

    <h1>Detalhe do Ativo</h1>

    <div id="conteudo" class="loading">
        Carregando dados do ativo...
    </div>

<div class="botoes">
    <button class="botao" onclick="voltarPagina()">
        Voltar
    </button>
</div>

<script>
function voltarPagina() {
    const params = new URLSearchParams(window.location.search);
    const tipo = params.get("tipo");

    window.location.href = `exibeAtivos.html?tipo=${tipo}`;
}
</script>

</div>
<script src="js/config/configCategoria.js"></script>
<script src="js/ativo.js"></script>

</body>
</html>
