<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Patrimonial</title>
    <link rel="shortcut icon" href="/Imagens/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style_Index.css">
</head>
<body>
    <main class="pagina-inicial">
        <header class="cabecalho-inicial">
            <img
                class="logo"
                src="/Imagens/patena.png"
                alt="Patena"
            >

            <div>
                <p class="rotulo-sistema">Inventário NFC</p>
                <h1>Controle Patrimonial</h1>
                <p id="instrucao">
                    Selecione abaixo o tipo de ativo que deseja consultar.
                </p>
            </div>

            <a
                class="admin-link"
                href="administracao.html"
                aria-label="Abrir administração"
                title="Administração"
            >
                <span aria-hidden="true">⚙</span>
                Administração
            </a>
        </header>

        <section
            id="tiposAtivo"
            class="categorias-grid"
            aria-live="polite"
        >
            <p class="mensagem-carregamento">
                Carregando tipos de ativo...
            </p>
        </section>
    </main>

    <script src="js/index.js"></script>
</body>
</html>
