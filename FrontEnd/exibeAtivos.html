<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ativos</title>
<link rel="icon" href="http://localhost:3000/favicon.ico">
<link rel="stylesheet" href="css/style_exibeAtivos.css">
</head>

<div id="modal" class="modal oculto">
    <div class="modal-conteudo">
        <h2 id="tituloModal"></h2>

        <form id="formModal">

            <div id="camposModal">
                <!-- Campos gerados dinamicamente -->
            </div>

            <button type="submit">
                Salvar
            </button>

            <button type="button" id="cancelarModal">
                Cancelar
            </button>

        </form>
    </div>
</div>

<div id="modalConfirmacao" class="modal oculto">
    <div class="modal-conteudo">
        <h2>Confirmar remoção</h2>

        <p id="textoConfirmacao"></p>

        <div class="acoes-confirmacao">

            <button type="button" id="btnCancelarRemocao">
                Cancelar
            </button>

            <button type="button" id="btnConfirmarRemocao" class="btn-remover">
                Remover
            </button>
        </div>
    </div>
</div>

<body>
<header>
    <img src="http://localhost:3000/patena.png" alt="Patena">
    <h2>Inventário NFC</h2>
</header>

<h1>Lista de Ativos</h1>

<div class="toolbar">

    <button id="btnAdicionar">
        Adicionar
    </button>

    <button id="btnEditar">
        Editar
    </button>

    <button id="btnRemover">
        Remover
    </button>

    <button id="btnStatus">
        Alterar Status
    </button>

    <input
        type="text"
        id="buscaId"
        placeholder="Buscar patrimônio">

    <button id="btnBuscar">
        Buscar
    </button>

</div>

<table>

    <thead id="cabecalhoTabela"></thead>

    <tbody id="tabela"></tbody>

</table>
<script src="js/config/configCategoria.js"></script>
<script src="js/app.js"></script>
<script src="js/modal.js"></script>
<script src="js/botoes.js"></script>

</body>
</html>
