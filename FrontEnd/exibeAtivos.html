<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ativos</title>

<style>

body{
    font-family: Arial;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

.toolbar{
    margin-bottom:20px;
}

.toolbar button{
    padding:8px 15px;
    margin-right:5px;
}

.toolbar input{
    padding:8px;
    width:200px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    border:1px solid #ccc;
    padding:10px;
}

th{
    background:#f2f2f2;
}

tr:hover{
    background:#f5f5f5;
}

.selecionado{
    background:#cfe2ff !important;
}

</style>
</head>

<body>

<h1>Lista de Ativos</h1>

<div class="toolbar">

    <button id="btnAdicionar">
        Adicionar
    </button>

    <button id="btnEditar">
        Editar
    </button>

    <button id="btnRemover">
        Remover
    </button>

    <button id="btnStatus">
        Alterar Status
    </button>

    <input
        type="text"
        id="buscaId"
        placeholder="Buscar patrimônio">

    <button id="btnBuscar">
        Buscar
    </button>

</div>

<table>

    <thead>
        <tr>
            <th>Patrimônio</th>
            <th>Descrição</th>
            <th>Categoria</th>
            <th>Setor</th>
            <th>Responsável</th>
            <th>Status</th>
        </tr>
    </thead>

    <tbody id="tabela"></tbody>

</table>

<script src="js/app.js"></script>
<script src="js/botoes.js"></script>

</body>
</html>
