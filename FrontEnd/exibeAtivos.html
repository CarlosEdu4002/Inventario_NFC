<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ativos</title>
<link rel="icon" href="http://localhost:3000/favicon.ico">
<link rel="stylesheet" href="css/style_exibeAtivos.css">
</head>

<body>
<header>
    <img src="http://localhost:3000/patena.png" alt="Patena">
    <h2>Inventário NFC</h2>
</header>

<h1>Lista de Ativos</h1>

<div class="toolbar">

    <button id="btnAdicionar">
        Adicionar
    </button>

    <button id="btnEditar">
        Editar
    </button>

    <button id="btnRemover">
        Remover
    </button>

    <button id="btnStatus">
        Alterar Status
    </button>

    <input
        type="text"
        id="buscaId"
        placeholder="Buscar patrimônio">

    <button id="btnBuscar">
        Buscar
    </button>

</div>

<table>

    <thead>
        <tr>
            <th>Patrimônio</th>
            <th>Descrição</th>
            <th>Categoria</th>
            <th>Setor</th>
            <th>Responsável</th>
            <th>Status</th>
        </tr>
    </thead>

    <tbody id="tabela"></tbody>

</table>

<script src="js/app.js"></script>
<script src="js/botoes.js"></script>

</body>
</html>
